<!DOCTYPE html>
<html>
<head>
    <title>Aryabhatta's Sine Table</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #0a0f1f;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            padding: 30px 16px 50px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #e8eaf6;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #7986cb;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(10, 15, 31, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 28px;
            max-width: 680px;
            margin: 0 auto;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .input-row label {
            font-size: 14px;
            color: #9fa8da;
            min-width: 130px;
        }

        input[type=number] {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e8eaf6;
            font-size: 15px;
            padding: 9px 14px;
            width: 160px;
            outline: none;
        }

        input[type=number]:focus {
            border-color: #5c6bc0;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: background 0.15s, transform 0.1s;
        }

        button:active { transform: scale(0.97); }

        .btn-primary {
            background: rgba(255, 152, 0, 0.85);
            color: #fff;
        }
        .btn-primary:hover { background: #e68900; }

        .btn-secondary {
            background: rgba(92, 107, 192, 0.25);
            color: #9fa8da;
            border: 1px solid rgba(92, 107, 192, 0.4);
        }
        .btn-secondary:hover { background: rgba(92, 107, 192, 0.4); }

        .btn-danger {
            background: rgba(229, 57, 53, 0.2);
            color: #ef9a9a;
            border: 1px solid rgba(229, 57, 53, 0.3);
        }
        .btn-danger:hover { background: rgba(229, 57, 53, 0.35); }

        #result {
            text-align: center;
            font-size: 20px;
            font-weight: 500;
            color: #80cbc4;
            min-height: 30px;
            margin-bottom: 20px;
        }

        .chart-wrap {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 24px;
        }

        canvas#sineChart {
            width: 100% !important;
            height: 200px !important;
            display: block;
        }

        .tbl-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: rgba(92, 107, 192, 0.3);
            color: #9fa8da;
            padding: 10px 14px;
            text-align: left;
            font-weight: 500;
        }

        td {
            padding: 8px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #cfd8dc;
        }

        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) td { background: rgba(255, 255, 255, 0.02); }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            margin: 22px 0;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">
    <h1>Aryabhatta's Sine Table</h1>
    <p class="subtitle">Ancient Indian mathematics, visualized</p>

    <div class="card">

        <div class="input-row">
            <label>Angle (degrees)</label>
            <input type="number" id="angleInput" placeholder="e.g. 45" min="0" max="360">
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="calculateSine()">Calculate Sine</button>
            <button class="btn-secondary" onclick="generateTable()">Generate Table</button>
            <button class="btn-danger" onclick="clearAll()">Clear</button>
        </div>

        <div id="result"></div>

        <div class="chart-wrap">
            <canvas id="sineChart"></canvas>
        </div>

        <hr class="divider">

        <div class="tbl-wrap">
            <table id="sineTable">
                <tr>
                    <th>Angle (°)</th>
                    <th>Sine Value</th>
                </tr>
            </table>
        </div>

    </div>
</div>

<script>
    /* ── Animated Background ── */
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let W, H, frame = 0;

    function resizeBg() {
        W = bgCanvas.width = window.innerWidth;
        H = bgCanvas.height = window.innerHeight;
    }
    resizeBg();
    window.addEventListener('resize', resizeBg);

    function drawBg() {
        bgCtx.clearRect(0, 0, W, H);
        const t = frame * 0.012;

        /* Grid lines */
        bgCtx.strokeStyle = 'rgba(255,255,255,0.04)';
        bgCtx.lineWidth = 0.5;
        const gs = 40;
        for (let x = 0; x < W; x += gs) {
            bgCtx.beginPath(); bgCtx.moveTo(x, 0); bgCtx.lineTo(x, H); bgCtx.stroke();
        }
        for (let y = 0; y < H; y += gs) {
            bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(W, y); bgCtx.stroke();
        }

        /* Flowing sine waves */
        const waves = [
            { a: 30, f: 0.013, speed: 1.0,  col: 'rgba(92,107,192,0.3)',  lw: 1.8 },
            { a: 20, f: 0.020, speed: 1.4,  col: 'rgba(38,166,154,0.2)',  lw: 1.2 },
            { a: 14, f: 0.030, speed: 0.7,  col: 'rgba(255,152,0,0.15)',  lw: 0.9 }
        ];

        waves.forEach(w => {
            bgCtx.beginPath();
            bgCtx.strokeStyle = w.col;
            bgCtx.lineWidth = w.lw;
            const mid = H * 0.68;
            for (let x = 0; x <= W; x += 2) {
                const y = mid + Math.sin(x * w.f + t * w.speed) * w.a;
                x === 0 ? bgCtx.moveTo(x, y) : bgCtx.lineTo(x, y);
            }
            bgCtx.stroke();
        });

        frame++;
        requestAnimationFrame(drawBg);
    }
    drawBg();

    /* ── Sine Calculator ── */
    let chart;

    function calculateSine() {
        const raw = document.getElementById('angleInput').value;
        if (raw === '') {
            document.getElementById('result').innerText = 'Please enter an angle.';
            return;
        }
        const angle = parseFloat(raw);
        const rad = angle * Math.PI / 180;
        const sv = Math.sin(rad).toFixed(6);

        document.getElementById('result').innerHTML =
            `sin(${angle}°) = <strong style="color:#80cbc4">${sv}</strong>`;

        drawGraph(angle);
    }

    function drawGraph(userAngle) {
        const ctx = document.getElementById('sineChart').getContext('2d');
        const labels = [], data = [];

        for (let i = 0; i <= 360; i += 2) {
            labels.push(i);
            data.push(parseFloat(Math.sin(i * Math.PI / 180).toFixed(6)));
        }

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'sin(θ)',
                        data,
                        borderColor: '#5c6bc0',
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: 'rgba(92,107,192,0.1)',
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: 'Your angle',
                        data: labels.map(x =>
                            x === Math.round(userAngle)
                                ? parseFloat(Math.sin(x * Math.PI / 180).toFixed(6))
                                : null
                        ),
                        borderColor: '#ff7043',
                        pointRadius: 7,
                        pointBackgroundColor: '#ff7043',
                        showLine: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: '#9fa8da', font: { size: 12 } }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#546e7a', maxTicksLimit: 13, font: { size: 11 } },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    y: {
                        min: -1, max: 1,
                        ticks: { color: '#546e7a', font: { size: 11 } },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    }
                }
            }
        });
    }

    function generateTable() {
        const tbl = document.getElementById('sineTable');
        tbl.innerHTML = `
            <tr>
                <th>Angle (°)</th>
                <th>Sine Value</th>
            </tr>`;

        for (let i = 0; i <= 360; i += 15) {
            const sv = Math.sin(i * Math.PI / 180);
            const row = tbl.insertRow();
            row.insertCell(0).innerText = i + '°';
            row.insertCell(1).innerText = sv.toFixed(6);
        }
    }

    function clearAll() {
        document.getElementById('angleInput').value = '';
        document.getElementById('result').innerText = '';
        if (chart) { chart.destroy(); chart = null; }
        document.getElementById('sineTable').innerHTML = `
            <tr>
                <th>Angle (°)</th>
                <th>Sine Value</th>
            </tr>`;
    }

    document.getElementById('angleInput')
        .addEventListener('keydown', e => { if (e.key === 'Enter') calculateSine(); });
</script>

</body>
</html>
